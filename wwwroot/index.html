<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Pharmacy - Medicine Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 ABC Pharmacy Management System</h1>
        </header>

        <!-- Statistics Dashboard -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Medicines</h3>
                <p id="totalMedicines">0</p>
            </div>
            <div class="stat-card warning">
                <h3>Low Stock (<10)</h3>
                <p id="lowStock">0</p>
            </div>
            <div class="stat-card danger">
                <h3>Expiring Soon (<30 days)</h3>
                <p id="expiringSoon">0</p>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Search by medicine name or brand..." />
            <button onclick="searchMedicines()">Search</button>
            <button onclick="loadMedicines()" class="btn-secondary">Show All</button>
        </div>

        <!-- Add Medicine Form -->
        <div class="form-section">
            <h2>Add New Medicine</h2>
            <form id="medicineForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="fullName" required />
                    </div>
                    <div class="form-group">
                        <label>Brand *</label>
                        <input type="text" id="brand" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry Date *</label>
                        <input type="date" id="expiryDate" required />
                    </div>
                    <div class="form-group">
                        <label>Quantity *</label>
                        <input type="number" id="quantity" min="0" required />
                    </div>
                    <div class="form-group">
                        <label>Price *</label>
                        <input type="number" id="price" step="0.01" min="0" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes" rows="2"></textarea>
                </div>

                <button type="submit" class="btn-primary">Add Medicine</button>
            </form>
        </div>

        <!-- Medicines List -->
        <div class="table-section">
            <h2>Medicines Inventory</h2>
            <div class="table-container">
                <table id="medicinesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Brand</th>
                            <th>Expiry Date</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="medicinesBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
